type: "cascade_2026.agent_simulstream_mbr.CascadeSpeechProcessor"
speech_chunk_size: 0.96
latency_unit: "word"
detokenizer_type: "simuleval"

# Modelos
asr_model_name: "Qwen/Qwen3-ASR-1.7B"
llm_model_name: "Qwen/Qwen3-4B-Instruct-2507"

# Idiomas
source_lang: "English"
target_lang: "German"

# Parámetros de segmentación
min_start_seconds: 5.0
max_history_utterances: 0

# Parámetros de generación LLM
max_new_tokens: 100
temperature: 1.0
repetition_penalty: 1.05
epsilon: 0.02
n_samples: 32

# Método de decodificación MBRS
# Opciones: none | rambr_chrf | prunembr_xcomet | rerank_kiwi
decoding_method: "prunembr_xcomet"

# Parámetros específicos por método
xcomet_model: "myyycroft/XCOMET-lite"
xcomet_batch_size: 16
kiwi_model: "Unbabel/wmt22-cometkiwi-da"
kiwi_batch_size: 8

# Contexto externo
ner_results_path: null
