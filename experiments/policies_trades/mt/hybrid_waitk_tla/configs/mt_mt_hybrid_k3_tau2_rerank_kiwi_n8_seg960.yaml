type: "cascade_2026.agent_simulstream_mt_policies.CascadeSpeechProcessor"
speech_chunk_size: 0.96
latency_unit: "word"
detokenizer_type: "simuleval"

# Modelos
asr_model_name: "Qwen/Qwen3-ASR-1.7B"
llm_model_name: "Qwen/Qwen3-4B-Instruct-2507"
asr_gpu_memory_utilization: 0.36
llm_gpu_memory_utilization: 0.36

# Idiomas
source_lang: "English"
target_lang: "German"

# Segmentación
min_start_seconds: 5.0
max_history_utterances: 0

# Generación LLM (MBR solo al cerrar utterance; greedy en utt=False)
max_new_tokens: 100
temperature: 1.0
repetition_penalty: 1.05
epsilon: 0.02
n_samples: 8

# Decoder MBRS
decoding_method: "rerank_kiwi"
xcomet_model: "myyycroft/XCOMET-lite"
xcomet_batch_size: 16
kiwi_model: "Unbabel/wmt22-cometkiwi-da"
kiwi_batch_size: 8

# Política de emisión de ASR (FIJA en este estudio)
asr_policy: "tolerant_agreement"
hold_n_chunks: 2
tolerant_tau: 1
asr_transcript_log: "/data/jagucam1@alumno.upv.es/MAIN/experiments/policies_trades/mt/hybrid_waitk_tla/transcripts/mt_mt_hybrid_k3_tau2_rerank_kiwi_n8_seg960.transcript.jsonl"

# Política de emisión de MT (la que se varía)
mt_policy: "hybrid_waitk_tla"
wait_k: 3
mt_tolerant_tau: 2

# Contexto externo
ner_results_path: null
